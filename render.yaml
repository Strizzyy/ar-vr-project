services:
  - type: web
    name: ar-face-stickers
    runtime: python
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt &&
      python scripts/download_assets.py &&
      cd ../client &&
      npm install &&
      VITE_API_BASE_URL="" npm run build
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "app.main:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
